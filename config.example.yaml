# ============================================================
# Daily Digest - Configuration
# ============================================================
# Copy this file to config.yaml and customize:
#   cp config.example.yaml config.yaml
# ============================================================

# --- Schedule ---
schedule:
  frequency: "daily"          # "daily" or "every_other_day"
  send_time: "07:00"          # 24h format, your local time
  timezone: "Europe/Paris"    # Your timezone (IANA format)
  items_per_digest: 2         # deep reads per digest (news desk items are separate)

# --- Topics ---
# Weights control how much of each digest is allocated to this topic.
# Weights should sum to roughly 1.0 but don't need to be exact.
topics:
  - name: "AI & Machine Learning"
    weight: 0.30
    description: "AI research, LLM developments, AI infrastructure, applied AI"
  - name: "GTM & Product Strategy"
    weight: 0.25
    description: "Go-to-market, product management, SaaS growth, sales strategy"
  - name: "Investing & Mental Models"
    weight: 0.20
    description: "Investment frameworks, second-level thinking, risk assessment"
  - name: "China-Tech & Geopolitics"
    weight: 0.15
    description: "China tech ecosystem, US-China dynamics, ASEAN markets"
  - name: "General Interest"
    weight: 0.10
    description: "Science, history, philosophy, culture, anything surprising"

# --- Content Sources ---
# Types: "rss", "api", "scrape", "evergreen"
#
# RSS:    url is the RSS/Atom feed URL
# API:    currently supports "hackernews" and "reddit"
# Scrape: url is the page to scrape (basic article extraction)
# Evergreen: url points to a page listing essays/articles (scraped once, then
#            individual pieces are served over time)
#
# Lens sources: add `role: "lens"` to any source (e.g. an essayist you read
# for mental models rather than news) to exclude it from competing for a
# digest slot. Instead, its most relevant piece gets applied as a connecting
# framework across that day's actual picks — see the "Today's Lens" section
# in the email. At most one lens source's article is used per digest.

sources:
  # --- Live feeds (checked daily) ---
  - name: "Lenny's Newsletter"
    type: "rss"
    url: "https://www.lennysnewsletter.com/feed"
    topics: ["GTM & Product Strategy"]

  - name: "Paul Graham Essays"
    type: "evergreen"
    url: "https://paulgraham.com/articles.html"
    role: "lens"  # optional: see "Lens sources" below
    topics: ["General Interest", "Investing & Mental Models"]

  - name: "Stratechery"
    type: "rss"
    url: "https://stratechery.com/feed/"
    topics: ["AI & Machine Learning", "GTM & Product Strategy"]

  - name: "Hacker News (Top Stories)"
    type: "api"
    api_name: "hackernews"
    max_items: 10
    topics: ["AI & Machine Learning", "General Interest"]

  - name: "AI Research (arXiv)"
    type: "rss"
    url: "https://rss.arxiv.org/rss/cs.AI"
    topics: ["AI & Machine Learning"]
    max_items: 5

  # --- Add your own sources below ---
  # - name: "Howard Marks Memos"
  #   type: "evergreen"
  #   url: "https://www.oaktreecapital.com/insights/memo-archive"
  #   topics: ["Investing & Mental Models"]

  # - name: "Specific Subreddit"
  #   type: "api"
  #   api_name: "reddit"
  #   subreddit: "MachineLearning"
  #   max_items: 5
  #   topics: ["AI & Machine Learning"]

# --- Interest Profile ---
# Used by the LLM to score relevance. Write this as if you're describing
# yourself to a research assistant who's curating reading for you.
interest_profile: |
  I'm an MBA candidate with a strategy consulting background, focused on
  the intersection of AI, enterprise SaaS, and China-ASEAN markets. I care
  about frameworks and mental models more than news. I value:
  - First-principles reasoning and contrarian thinking
  - Practical GTM and product strategy (not theory)
  - AI developments that affect business strategy (not pure research)
  - Investment frameworks from practitioners (Marks, Munger, Graham)
  - Cross-cultural business dynamics, especially China-West
  I don't care about: crypto, web3, celebrity tech news, or hype cycles.

# --- News Desk (optional) ---
# At most max_events current events per digest, analyzed in depth: full-text
# fetch of free coverage, web-search enrichment, and a grounded expert lens.
# A cheap model scans headlines and clusters them into events; on a slow news
# day zero events clear the bar and the section is omitted. Stick to feeds
# with free full text (BBC, Guardian, NPR, etc.) — paywalled feeds only give
# headlines, though web search partially compensates.
news:
  enabled: true
  max_events: 2
  selection_model: "claude-haiku-4-5-20251001"
  sources:
    - name: "BBC World"
      url: "http://feeds.bbci.co.uk/news/world/rss.xml"
    - name: "The Guardian World"
      url: "https://www.theguardian.com/world/rss"
    - name: "NPR News"
      url: "https://feeds.npr.org/1001/rss.xml"
    - name: "Techmeme"
      url: "https://www.techmeme.com/feed.xml"

# --- Expert Lens Grounding ---
# Lenses attribute claims to real named people, so every rendered lens must
# cite a specific source (book/memo/talk) and self-rate its confidence that
# the expert actually articulated the cited concept. Anything below
# min_confidence is dropped; the section simply doesn't appear rather than
# shipping a synthesized attribution.
expert_lens:
  max_per_item: 1             # one grounded lens beats three synthesized ones
  min_confidence: "high"      # high | medium | low

# --- Spaced Repetition ---
# Opt-in: nothing enrolls automatically. Reply "more item N" (👍) to a digest
# item, or explicitly add a concept, to enroll it as an atomic Q&A card
# (question + self-checkable answer; answers print at the email's bottom).
# Grading by reply: "recall N missed" resets the card to the first interval,
# "stop recall N" retires it, silence counts as a pass and advances it.
repetition:
  enabled: true
  # Interval ladder in days between reviews of the same card
  intervals: [1, 3, 7, 14, 30, 60]
  # Number of recall cards per digest
  callbacks_per_digest: 2

# --- Expert Roster ---
# Optional. Named analytical lenses applied to each digest article at send
# time (2-3 relevant experts per article, matched by domain overlap with the
# article's tags). Write `framework` as their specific documented mental
# model, not generic wisdom — the more concrete, the better the analysis.
# `lens_key` is a short label shown next to their name in the email.
# `domains` should be a subset of your `topics` names above.
#
# These are config-only until you run `python scripts/sync_experts.py`,
# which pushes them through the concept pipeline so they also show up in
# your spaced-repetition review queue, not just as a digest-time lens.
experts:
  - name: "Ben Thompson"
    lens_key: "Aggregation Theory — control demand, suppliers follow"
    framework: "Aggregation Theory: platforms that control demand aggregate suppliers without owning them. Modular vs. integrated tech stacks. The internet enables direct-to-consumer, destroying traditional bundled distribution."
    domains: ["AI & Machine Learning", "GTM & Product Strategy"]

  - name: "Michael Mauboussin"
    lens_key: "base rates — outside view before inside view, skill vs. luck"
    framework: "Base rates over narratives. Distinguishes skill from luck using reversion to mean. Applies outside-view statistics before inside-view analysis. Competitive advantage periods are shorter than companies believe."
    domains: ["Investing & Mental Models", "GTM & Product Strategy"]

  - name: "Philip Tetlock"
    lens_key: "superforecasting — update in small increments, outside view first"
    framework: "Superforecasting: update frequently, in small increments, on specific falsifiable predictions. Foxes beat hedgehogs. Outside view first, inside view second. Track record over confidence. Decompose problems into sub-questions."
    domains: ["General Interest", "Investing & Mental Models"]

# --- Feedback ---
feedback:
  # How often to check for email replies (minutes)
  check_interval: 30
  # Keywords the reply parser recognizes
  commands:
    save: ["save", "bookmark", "later", "come back"]
    positive: ["more", "like this", "great", "good", "👍"]
    negative: ["less", "skip", "boring", "👎"]
    add_url: ["add", "queue", "read this"]
